<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактор візитки — VizitkaPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.2/dist/darkly/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=Roboto+Slab:wght@300;400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
            <img src="img/logo.png" alt="logo" style="height: 30px;" class="me-2"> BizCard
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                <li class="nav-item"><a class="nav-link" href="patterns.html">Шаблони</a></li>
                <li class="nav-item"><a class="nav-link" href="terms.html">Умови використання</a></li>
            </ul>
        </div>
    </div>
</nav>

    <main class="py-5 mt-5">
        <div class="container py-4">
            <div class="row g-4">
                <div class="col-lg-5 order-2 order-lg-1" data-aos="fade-right">
                    <div class="card bg-dark border-secondary p-4 shadow">
                        <h2 class="h4 fw-bold mb-4 text-primary text-uppercase">Налаштування</h2>
                        
                        <div class="mb-3">
                            <label class="form-label small text-uppercase opacity-50">Ваше Ім'я</label>
                            <input type="text" id="input-name" class="form-control bg-dark text-white border-secondary" placeholder="Олександр Іванов">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-uppercase opacity-50">Посада</label>
                            <input type="text" id="input-job" class="form-control bg-dark text-white border-secondary" placeholder="Менеджер">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-uppercase opacity-50">Телефон</label>
                            <input type="text" id="input-phone" class="form-control bg-dark text-white border-secondary" placeholder="+380 00 000 00 00">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-uppercase opacity-50">Email</label>
                            <input type="text" id="input-email" class="form-control bg-dark text-white border-secondary" placeholder="mail@example.com">
                        </div>

                        <hr class="my-4 opacity-10">
                        
                        <button id="download-btn" class="btn btn-primary w-100 py-3 fw-bold rounded-pill text-uppercase">
                            <i class="fa-solid fa-download me-2"></i> Завантажити візитку
                        </button>
                    </div>
                </div>

                <div class="col-lg-7 text-center order-1 order-lg-2" data-aos="fade-left">
                    <div class="preview-box">
                        <h3 class="h6 text-uppercase opacity-50 mb-3">Попередній перегляд</h3>
                        <canvas id="vizitkaCanvas" width="1000" height="600"></canvas>
                        <p class="mt-3 small text-info"><i class="fa-solid fa-circle-info me-1"></i> Текст змінюється автоматично</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-white py-5 border-top border-secondary">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start">
                    <h4 class="fw-bold"><img src="img/logo.png" alt="logo" style="height: 35px;" class="me-2"> BizCard</h4>
                    <p class="small opacity-50">Професійні рішення для вашого нетворкінгу.</p>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <nav class="d-flex justify-content-center justify-content-md-end gap-3">
                        <a href="index.html" class="text-white text-decoration-none small">Головна</a>
                        <a href="patterns.html" class="text-white text-decoration-none small">Шаблони</a>
                        <a href="terms.html" class="text-white text-decoration-none small">Умови використання</a>
                    </nav>
                </div>
            </div>
            <hr class="my-4 opacity-10">
            <p class="text-center small opacity-50 mb-0">© 2026 BizCard Project. Всі права захищені.</p>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/editor.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
</body>
</html>
